name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    env:
      AUTOMERGE_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN || secrets.GH_AUTOMERGE_TOKEN || secrets.AUTO_MERGE_TOKEN || secrets.AUTO_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN || secrets.GH_AUTOMERGE_TOKEN || secrets.AUTO_MERGE_TOKEN || secrets.AUTO_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.DEPENDABOT_AUTOMERGE_TOKEN || secrets.GH_AUTOMERGE_TOKEN || secrets.AUTO_MERGE_TOKEN || secrets.AUTO_APPROVE_TOKEN || secrets.GITHUB_TOKEN }}
      PR_URL: ${{ github.event.pull_request.html_url }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        # Pinned to a specific commit SHA to prevent tag moves from running unexpected code with elevated permissions.
        # To update: find the latest commit for dependabot/fetch-metadata v2.x and replace the SHA below.
        uses: dependabot/fetch-metadata@b251b9d714464f2e9e8dbcc2339d3cde3c87c41c
        with:
          github-token: "${{ env.AUTOMERGE_TOKEN }}"

      - name: Check for breaking changes
        id: breaking
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          IS_BREAKING="false"
          REASON=""

          # Major version bump is always treated as a potential breaking change
          if [[ "$UPDATE_TYPE" == "version-update:semver-major" ]]; then
            IS_BREAKING="true"
            REASON="major version bump"
          fi

          # Check PR title and body for breaking change keywords
          if echo "$PR_TITLE $PR_BODY" | grep -qiE "breaking[[:space:]_-]?changes?|BREAKING[[:space:]_-]?CHANGE:?|incompatible change|breaking update"; then
            IS_BREAKING="true"
            if [[ -n "$REASON" ]]; then
              REASON="${REASON}, breaking change keyword detected in PR text"
            else
              REASON="breaking change keyword detected in PR text"
            fi
          fi

          {
            echo "is_breaking=${IS_BREAKING}"
            echo "reason=${REASON}"
            echo "update_type=${UPDATE_TYPE}"
          } >> "$GITHUB_OUTPUT"

      - name: Auto-approve non-breaking update (best-effort)
        if: steps.breaking.outputs.is_breaking == 'false'
        run: |
          if gh pr review --approve "$PR_URL" \
            --body "✅ Auto-approved: non-breaking \`${{ steps.breaking.outputs.update_type }}\` dependency update."; then
            echo "Auto-approval submitted."
          else
            echo "::warning::Auto-approval was not permitted with the current token; continuing to merge non-breaking update."
          fi

      - name: Merge non-breaking update immediately
        if: steps.breaking.outputs.is_breaking == 'false'
        run: gh pr merge --squash "$PR_URL"

      - name: Notify maintainer of blocked breaking-change PR
        if: steps.breaking.outputs.is_breaking == 'true'
        env:
          BLOCK_REASON: ${{ steps.breaking.outputs.reason }}
        run: |
          cat <<'COMMENT_EOF' > /tmp/block-comment.md
          ⚠️ **Auto-merge blocked** — potential breaking change detected.

          **Reason:** BLOCK_REASON_PLACEHOLDER

          This PR requires manual review and approval before merging. Please:
          1. Review the upstream changelog for breaking changes
          2. Update any affected code in the repository to accommodate the new version
          3. Merge manually once compatibility is verified

          ---
          *Automated check by the Dependabot Auto-Merge workflow.*
          COMMENT_EOF
          sed -i "s|BLOCK_REASON_PLACEHOLDER|${BLOCK_REASON}|g" /tmp/block-comment.md
          gh pr comment "$PR_URL" --body-file /tmp/block-comment.md

      - name: Label breaking-change PR for manual review
        if: steps.breaking.outputs.is_breaking == 'true'
        run: gh pr edit "$PR_URL" --add-label "breaking-change"
        continue-on-error: true
