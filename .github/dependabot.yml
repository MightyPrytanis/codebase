# Dependabot configuration for Cyrano ecosystem
# Scans only active development directories listed below.
# Legacy/ and archive/ are intentionally omitted — they are frozen
# and must not receive dependency updates.
#
# Note: exclude-paths is NOT a valid Dependabot option and is silently
# ignored. Exclusion of directories works solely by not listing them here.
#
# Active directories (scanned for dependency updates):
#   - /Cyrano (MCP server and core modules)
#   - /Cyrano/auth-server (authentication service)
#   - /apps/lexfiat (LexFiat application)
#   - /apps/arkiver (Arkiver application wrapper)
#   - /apps/arkiver/frontend (Arkiver frontend)
#   - /Labs/Potemkin/app (Potemkin experimental app)
#   - /Labs/Potemkin/moral_reasoner (Potemkin moral reasoner)
#
# Grouping policy:
#   - patch and minor updates are grouped into a single PR per directory
#     (auto-merged by the dependabot-auto-merge workflow)
#   - major updates remain as individual PRs and require manual review
#
# Ignore policy:
#   - typescript major updates are ignored across all packages until
#     typescript-eslint releases a version that supports TypeScript 6+
#     (typescript-eslint@8.57.2 requires typescript@>=4.8.4 <6.0.0)
#
version: 2
updates:
  # Cyrano main package
  - package-ecosystem: "npm"
    directory: "/Cyrano"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "cyrano"
    groups:
      non-breaking-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      # typescript-eslint@8.57.2 requires typescript@>=4.8.4 <6.0.0;
      # block major TS bumps until typescript-eslint supports TS6
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Cyrano auth-server
  - package-ecosystem: "npm"
    directory: "/Cyrano/auth-server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "cyrano"
      - "auth-server"
    groups:
      non-breaking-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # LexFiat app
  - package-ecosystem: "npm"
    directory: "/apps/lexfiat"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "lexfiat"
    groups:
      non-breaking-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Arkiver app
  - package-ecosystem: "npm"
    directory: "/apps/arkiver"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "arkiver"
    groups:
      non-breaking-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Arkiver frontend
  - package-ecosystem: "npm"
    directory: "/apps/arkiver/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "arkiver"
    groups:
      non-breaking-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Labs - Potemkin app
  - package-ecosystem: "npm"
    directory: "/Labs/Potemkin/app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "labs"
      - "potemkin"
    groups:
      non-breaking-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # Labs - Potemkin moral_reasoner
  - package-ecosystem: "npm"
    directory: "/Labs/Potemkin/moral_reasoner"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "labs"
      - "potemkin"
    groups:
      non-breaking-deps:
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
