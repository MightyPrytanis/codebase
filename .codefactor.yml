# CodeFactor configuration
# Prevents auto-fix PRs from modifying files that should never be
# hand-edited (lockfiles, generated assets, vendored code).
# See: https://support.codefactor.io/i63-exclude-folders-or-files

EngineFilters:
  IgnoredPaths:
    # Dependency lockfiles — must be regenerated by npm, never hand-edited
    - "**/package-lock.json"
    - "**/yarn.lock"
    - "**/pnpm-lock.yaml"
    - "**/.yarn/**"

    # Installed dependencies
    - "**/node_modules/**"

    # Build / compiled output
    - "**/dist/**"
    - "**/build/**"
    - "**/.next/**"
    - "**/coverage/**"

    # Legacy / archived code (not actively maintained)
    - "Legacy/**"

    # Generated migration files
    - "**/migrations/**"

    # Large vendored / auto-generated CSS bundles
    # (CodeFactor CSS shorthand fixes on these files are cosmetic and low-value;
    # they can introduce subtle regressions in LCARS/glass-morphism layouts)
    - "apps/lexfiat/client/src/styles/**"
    - "Cyrano/shared-assets/**"

    # Patch files managed by patch-package
    - "**/patches/**"
